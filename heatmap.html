<!DOCTYPE html>
<html>
<head>
    <title>Heatmap</title>
    <link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css' />
    <script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script>
    <style>
        #map { height: 100vh; }
    </style>
</head>
<body>
    <div id='map'></div>
    <script>
        var map = L.map('map').setView([55.0131, 82.9508], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);
        var markers = [
            [55.0132, 82.9506],
            [55.013, 82.951],
            [55.013, 82.9509],
            [55.0131, 82.9507],
            [55.0131, 82.9507],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
            [55.0131, 82.9508],
        ];
        markers.forEach(function(m) {
            L.marker(m).addTo(map);
        });
    </script>
</body>
</html>
