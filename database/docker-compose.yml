version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: cellmap_db
    restart: always
    environment:
      POSTGRES_DB: cellmap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cellmap_network

  # Опционально: pgAdmin для удобного просмотра БД
  pgadmin:
    image: dpage/pgadmin4
    container_name: cellmap_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cellmap.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - cellmap_network
    depends_on:
      - postgres

networks:
  cellmap_network:
    driver: bridge

volumes:
  pg_data: